<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-custom {
            border-radius: 20px;
            padding: 40px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title {
            color: #0d6efd;
            font-weight: bold;
        }

        .subtitle {
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container hero">
    <div class="card-custom text-center col-md-6">
        <h1 class="title">📦 Sistema de Inventario</h1>
        <p class="subtitle mt-3">
            Gestiona productos, ventas y compras desde cualquier lugar del mundo.
        </p>

        <div class="d-grid mt-4">
            <a href="{{ url_for('productos') }}" class="btn btn-primary btn-lg">
                Ingresar al Sistema
            </a>
        </div>
    </div>
</div>

</body>
</html>
